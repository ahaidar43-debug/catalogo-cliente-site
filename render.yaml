services:
  - type: web
    name: catalogo-cliente
    runtime: node
    repo: https://github.com/ahaidar43-debug/catalogo-cliente-site
    branch: main
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: catalogo-cliente-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SELLER_USERNAME
        value: vendedora
      - key: SELLER_PASSWORD
        sync: false
      - key: UPDATE_DEFAULT_PASSWORDS
        value: "1"

databases:
  - name: catalogo-cliente-db
